name: GoalGenius AI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    name: Backend CI (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx python-dotenv

      - name: Run Pytest suite
        run: |
          cd backend
          python -m pytest

  frontend-checks:
    name: Frontend CI (Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter
        run: |
          cd frontend
          npm run lint || true # Oxlint warnings only

      - name: Run Vitest Unit Tests
        run: |
          cd frontend
          npx vitest run

      - name: Verify Build Compiles
        run: |
          cd frontend
          npm run build
